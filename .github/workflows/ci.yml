name: CodeArena CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Codebase
        run: pnpm turbo run lint

      - name: Run Tests
        run: pnpm turbo run test

      - name: Build Applications
        run: pnpm turbo run build

      # Placeholder for Docker build step (to be expanded in Phase 7)
      - name: Build Docker Images
        run: echo "Building Docker images for apps/api and apps/judge..."